# aaPanel + Nginx vhost for logs.cajeer.ru
# PHP-only edition. No proxy_pass to Go/Node collectors.
# Root MUST point to the public directory.

server{
    listen 80;
    listen 443 ssl;
    listen 443 quic;
    http2 on;

    server_name logs.cajeer.ru;
    index index.php index.html index.htm default.php default.htm default.html;
    root /www/wwwroot/logs.cajeer.ru/public;

    include /www/server/panel/vhost/nginx/extension/logs.cajeer.ru/*.conf;

    #HTTP_TO_HTTPS_START
    if ($server_port !~ 443){
        rewrite ^(/.*)$ https://$host$1 permanent;
    }
    #HTTP_TO_HTTPS_END

    ssl_certificate     /www/server/panel/vhost/cert/logs.cajeer.ru/fullchain.pem;
    ssl_certificate_key /www/server/panel/vhost/cert/logs.cajeer.ru/privkey.pem;
    ssl_protocols TLSv1.1 TLSv1.2 TLSv1.3;
    ssl_ciphers EECDH+CHACHA20:EECDH+CHACHA20-draft:EECDH+AES128:RSA+AES128:EECDH+AES256:RSA+AES256:EECDH+3DES:RSA+3DES:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_tickets on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header Alt-Svc 'quic=":443"; h3=":443"; h3-29=":443"; h3-27=":443";h3-25=":443"; h3-T050=":443"; h3-Q050=":443";h3-Q049=":443";h3-Q048=":443"; h3-Q046=":443"; h3-Q043=":443"' always;

    error_page 497 https://$host$request_uri;
    error_page 404 /404.html;
    # Keep PHP application error bodies visible. Otherwise aaPanel/Nginx may replace
    # diagnostic JSON/HTML with public/500.html, hiding the real cause.
    fastcgi_intercept_errors off;
    error_page 502 /502.html;

    # IMPORTANT:
    # This site is expected to run on PHP 8.3 in aaPanel.
    # Do not hardcode fastcgi_pass here; aaPanel's include contains the correct PHP-FPM upstream.
    # If the site is assigned to another PHP version, replace 83 with that version.
    include enable-php-83.conf;
    include /www/server/panel/vhost/rewrite/logs.cajeer.ru.conf;

    client_max_body_size 2m;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; img-src 'self' data: https:; style-src 'self' 'unsafe-inline'; script-src 'self'; font-src 'self' data:; connect-src 'self'; frame-ancestors 'self'; base-uri 'self'; form-action 'self'" always;
    add_header X-Robots-Tag "noindex, nofollow, noarchive, nosnippet" always;

    location = /_nginx_ok.txt {
        try_files $uri =404;
        expires 1m;
        access_log off;
    }

    location = /_php_ok.php {
        try_files $uri =404;
        access_log off;
    }

    location = /api/v1/ingest {
        limit_except POST { deny all; }
        try_files $uri $uri/ /index.php?$query_string;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location = /robots.txt { try_files $uri =404; expires 1h; }

    # Never expose application internals or secrets.
    location ~ ^/(app|bin|storage|sql|deploy|scripts|bot_clients)/ { deny all; }
    location ~ ^/(\.user\.ini|\.htaccess|\.git|\.env|\.svn|\.project|LICENSE|README\.md|DEPLOY_AAPANEL_NGINX\.md|FIX_502_AAPANEL_NGINX\.md)$ {
        return 404;
    }

    location ~ \.well-known { allow all; }
    if ( $uri ~ "^/\.well-known/.*\.(php|jsp|py|js|css|lua|ts|go|zip|tar\.gz|rar|7z|sql|bak)$" ) {
        return 403;
    }

    location ~ .*\.(gif|jpg|jpeg|png|bmp|swf|webp|svg|ico)$ {
        expires 30d;
        error_log /dev/null;
        access_log /dev/null;
    }

    location ~ .*\.(js|css)$ {
        expires 12h;
        error_log /dev/null;
        access_log /dev/null;
    }

    access_log  /www/wwwlogs/logs.cajeer.ru.log;
    error_log   /www/wwwlogs/logs.cajeer.ru.error.log;
}
