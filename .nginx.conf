# Nginx vhost для logs.cajeer.ru.
# PHP-only редакция: без proxy_pass к Go/Node collector.
# root обязан указывать на каталог public.

server{
    listen 80;
    listen 443 ssl;
    listen 443 quic;
    http2 on;

    server_name logs.cajeer.ru;
    index index.php index.html index.htm default.php default.htm default.html;
    root /www/wwwroot/logs.cajeer.ru/public;

    include /www/server/panel/vhost/nginx/extension/logs.cajeer.ru/*.conf;

    #HTTP_TO_HTTPS_START
    if ($server_port !~ 443){
        rewrite ^(/.*)$ https://$host$1 permanent;
    }
    #HTTP_TO_HTTPS_END

    ssl_certificate     /www/server/panel/vhost/cert/logs.cajeer.ru/fullchain.pem;
    ssl_certificate_key /www/server/panel/vhost/cert/logs.cajeer.ru/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_tickets off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header Alt-Svc 'quic=":443"; h3=":443"; h3-29=":443"' always;

    error_page 497 https://$host$request_uri;
    error_page 404 /404.html;
    # PHP-приложение само возвращает диагностический JSON/HTML.
    # Если включить intercept, Nginx может скрыть реальную причину ошибки.
    fastcgi_intercept_errors off;
    error_page 502 /502.html;

    # Сайт рассчитан на PHP 8.3.
    # Не указывайте fastcgi_pass вручную: серверный include содержит корректный upstream PHP-FPM.
    include enable-php-83.conf;
    include /www/server/panel/vhost/rewrite/logs.cajeer.ru.conf;

    client_max_body_size 2m;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; img-src 'self' data: https:; style-src 'self' 'unsafe-inline'; script-src 'self'; font-src 'self' data:; connect-src 'self'; frame-ancestors 'self'; base-uri 'self'; form-action 'self'" always;
    add_header X-Robots-Tag "noindex, nofollow, noarchive, nosnippet" always;

    location = /_nginx_ok.txt {
        try_files $uri =404;
        expires 1m;
        access_log off;
    }

    location = /_php_ok.php {
        try_files $uri =404;
        access_log off;
    }

    location = /api/v1/ingest {
        limit_except POST { deny all; }
        try_files $uri $uri/ /index.php?$query_string;
    }

    location = /sw.js {
        default_type application/javascript;
        try_files $uri =404;
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        access_log off;
    }

    location = /manifest.json {
        default_type application/json;
        try_files $uri =404;
        expires 1h;
        access_log off;
    }

    location = /manifest.webmanifest {
        default_type application/manifest+json;
        try_files $uri =404;
        expires 1h;
        access_log off;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location = /robots.txt { try_files $uri =404; expires 1h; }

    # Не публикуйте внутренние каталоги, секреты, документацию разработки и runtime-файлы.
    location ~ ^/(app|bin|storage|sql|deploy|scripts|bot_clients)/ { deny all; }
    location ~ ^/(\.user\.ini|\.htaccess|\.git|\.env|\.svn|\.project|LICENSE|README\.md|DEPLOY_AAPANEL_NGINX\.md|FIX_502_AAPANEL_NGINX\.md)$ {
        return 404;
    }

    location ~ \.well-known { allow all; }
    if ( $uri ~ "^/\.well-known/.*\.(php|jsp|py|js|css|lua|ts|go|zip|tar\.gz|rar|7z|sql|bak)$" ) {
        return 403;
    }

    location ~ .*\.(gif|jpg|jpeg|png|bmp|swf|webp|svg|ico)$ {
        expires 30d;
        error_log /dev/null;
        access_log /dev/null;
    }

    location ~ .*\.(js|css)$ {
        expires 12h;
        error_log /dev/null;
        access_log /dev/null;
    }

    access_log  /www/wwwlogs/logs.cajeer.ru.log;
    error_log   /www/wwwlogs/logs.cajeer.ru.error.log;
}
