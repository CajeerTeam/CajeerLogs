openapi: 3.1.0
info:
  title: Cajeer Logs Ingest API
  version: 1.0.0
  description: Контракт приёма журналов Cajeer Logs. Production-конфигурация по умолчанию требует HMAC-подпись.
servers:
  - url: https://logs.example.com
paths:
  /api/v1/ingest:
    post:
      summary: Принять пачку журналов
      description: |
        Принимает одну пачку событий от приложения, бота или инфраструктурного компонента.
        По умолчанию ingest-запрос должен быть подписан HMAC-заголовками `X-Log-Timestamp`, `X-Log-Nonce` и `X-Log-Signature`.
        В локальном dev-режиме подпись может быть выключена параметром `INGEST_REQUIRE_SIGNATURE=false`.
      operationId: ingestLogs
      security:
        - LogTokenHeader: []
        - BearerToken: []
      parameters:
        - name: X-Log-Token
          in: header
          required: false
          schema:
            type: string
          description: Исходный ingest-токен. Можно заменить заголовком `Authorization: Bearer <token>`.
        - name: X-Log-Timestamp
          in: header
          required: true
          schema:
            type: string
          description: Unix timestamp для HMAC-подписи. Обязателен в production-конфигурации.
        - name: X-Log-Nonce
          in: header
          required: true
          schema:
            type: string
          description: Уникальный nonce для защиты от повторной отправки. Повторный nonce возвращает `409 replayed_nonce`.
        - name: X-Log-Signature
          in: header
          required: true
          schema:
            type: string
          description: Hex HMAC-SHA256 от канонической строки запроса.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IngestRequest'
            examples:
              single_error:
                summary: Одна ошибка
                value:
                  logs:
                    - ts: '2026-04-27T19:00:00Z'
                      level: ERROR
                      project: ExampleProject
                      bot: ExampleBot
                      environment: production
                      version: 1.0.0
                      logger: app.worker
                      message: Ошибка обработки задачи
                      context:
                        job_id: '123'
              events_alias:
                summary: Alias events[]
                value:
                  events:
                    - level: INFO
                      message: Событие принято
      responses:
        '200':
          description: Пачка принята и сохранена.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IngestAcceptedResponse'
        '400':
          description: Некорректный payload.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Отсутствует токен или неверна HMAC-подпись.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Токен отключён или событие не соответствует политике токена.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Повторный nonce HMAC-подписи.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                ok: false
                error: replayed_nonce
                message: Nonce уже использован.
        '413':
          description: Тело запроса слишком большое.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          description: Превышен лимит запросов, событий или объёма данных.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Внутренняя ошибка приложения.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
components:
  securitySchemes:
    LogTokenHeader:
      type: apiKey
      in: header
      name: X-Log-Token
    BearerToken:
      type: http
      scheme: bearer
  schemas:
    IngestRequest:
      type: object
      properties:
        logs:
          type: array
          minItems: 1
          maxItems: 500
          items:
            $ref: '#/components/schemas/LogEvent'
        events:
          type: array
          minItems: 1
          maxItems: 500
          items:
            $ref: '#/components/schemas/LogEvent'
      oneOf:
        - required: [logs]
        - required: [events]
    LogEvent:
      type: object
      required: [message]
      properties:
        ts:
          type: string
          format: date-time
        level:
          type: string
          enum: [DEBUG, INFO, WARNING, WARN, ERROR, CRITICAL, AUDIT, SECURITY]
        project:
          type: string
          maxLength: 120
        bot:
          type: string
          maxLength: 120
        environment:
          type: string
          maxLength: 60
        version:
          type: string
          maxLength: 80
        host:
          type: string
          maxLength: 120
        logger:
          type: string
          maxLength: 160
        message:
          type: string
        exception:
          type: string
        trace_id:
          type: string
          maxLength: 160
        context:
          type: object
          additionalProperties: true
        user_id:
          type: string
        chat_id:
          type: string
        guild_id:
          type: string
    IngestAcceptedResponse:
      type: object
      required: [ok, inserted, message]
      properties:
        ok:
          type: boolean
          example: true
        inserted:
          type: integer
          description: Количество сохранённых событий.
          example: 1
        message:
          type: string
          example: Журналы приняты.
    ErrorResponse:
      type: object
      required: [ok, error]
      properties:
        ok:
          type: boolean
          example: false
        error:
          type: string
          example: invalid_token
        message:
          type: string
          example: Токен не найден или отключён.
