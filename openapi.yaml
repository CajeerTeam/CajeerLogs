openapi: 3.1.0
info:
  title: Cajeer Logs Ingest API
  version: 1.0.0
  description: Контракт приёма журналов Cajeer Logs.
servers:
  - url: https://logs.example.com
paths:
  /api/v1/ingest:
    post:
      summary: Принять пачку журналов
      description: Принимает одну пачку событий от приложения, бота или инфраструктурного компонента.
      operationId: ingestLogs
      parameters:
        - name: X-Log-Token
          in: header
          required: true
          schema:
            type: string
          description: Исходный ingest-токен, выданный в разделе ботов.
        - name: X-Log-Timestamp
          in: header
          required: false
          schema:
            type: string
          description: Unix timestamp для HMAC-подписи.
        - name: X-Log-Nonce
          in: header
          required: false
          schema:
            type: string
          description: Уникальный nonce для защиты от повторной отправки.
        - name: X-Log-Signature
          in: header
          required: false
          schema:
            type: string
          description: Hex HMAC-SHA256 от канонической строки запроса.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IngestRequest'
            examples:
              single_error:
                summary: Одна ошибка
                value:
                  logs:
                    - ts: '2026-04-27T19:00:00Z'
                      level: ERROR
                      project: Cajeer
                      bot: Worker
                      environment: production
                      version: 1.0.0
                      logger: app.worker
                      message: Ошибка обработки задачи
                      context:
                        job_id: '123'
      responses:
        '200':
          description: Пачка принята и сохранена.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IngestAcceptedResponse'
        '400':
          description: Некорректный payload.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Отсутствует токен или неверна HMAC-подпись.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Токен отключён или событие не соответствует политике токена.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '413':
          description: Тело запроса слишком большое.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          description: Превышен лимит запросов, событий или объёма данных.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
components:
  schemas:
    IngestRequest:
      type: object
      required: [logs]
      properties:
        logs:
          type: array
          minItems: 1
          maxItems: 500
          items:
            $ref: '#/components/schemas/LogEvent'
    LogEvent:
      type: object
      required: [message]
      properties:
        ts:
          type: string
          format: date-time
        level:
          type: string
          enum: [DEBUG, INFO, WARNING, WARN, ERROR, CRITICAL, AUDIT, SECURITY]
        project:
          type: string
          maxLength: 120
        bot:
          type: string
          maxLength: 120
        environment:
          type: string
          maxLength: 60
        version:
          type: string
          maxLength: 80
        host:
          type: string
          maxLength: 120
        logger:
          type: string
          maxLength: 160
        message:
          type: string
        exception:
          type: string
        trace_id:
          type: string
          maxLength: 160
        context:
          type: object
          additionalProperties: true
        user_id:
          type: string
        chat_id:
          type: string
        guild_id:
          type: string
    IngestAcceptedResponse:
      type: object
      required: [ok, inserted, message]
      properties:
        ok:
          type: boolean
          example: true
        inserted:
          type: integer
          description: Количество сохранённых событий.
          example: 1
        message:
          type: string
          example: Журналы приняты.
    ErrorResponse:
      type: object
      required: [ok, error]
      properties:
        ok:
          type: boolean
          example: false
        error:
          type: string
          example: invalid_token
        message:
          type: string
          example: Токен не найден или отключён.
