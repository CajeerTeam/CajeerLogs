openapi: 3.1.0
info:
  title: Cajeer Logs Ingest API
  version: 0.8.0
  description: API приёма событий от ботов и сервисов Cajeer.
servers:
  - url: https://logs.cajeer.ru
    description: Production
  - url: https://logs.example.com
    description: Пример локального контура
paths:
  /api/v1/ingest:
    post:
      operationId: ingestLogs
      summary: Принять пачку логов
      description: Принимает одно событие или массив событий от бота/сервиса. Project, bot и environment берутся из токена и валидируются политикой токена.
      tags:
        - Ingest
      security:
        - LogTokenHeader: []
        - LogTokenBearer: []
      parameters:
        - name: X-Log-Token
          in: header
          required: false
          description: Raw bot token. Можно передать вместо Bearer-токена.
          schema:
            type: string
            example: clog_0123456789abcdef
        - name: X-Log-Timestamp
          in: header
          required: false
          description: Unix timestamp или ISO-дата для HMAC-подписи.
          schema:
            type: string
            example: "1760000000"
        - name: X-Log-Nonce
          in: header
          required: false
          description: Уникальный nonce длиной 12–128 символов. Требуется при HMAC-подписи.
          schema:
            type: string
            example: 01HX4J0R7M5Z8R9PQ2BA
        - name: X-Log-Signature
          in: header
          required: false
          description: HMAC-SHA256 от строки `{timestamp}\n{nonce}\n{sha256(raw_body)}` с raw bot token как ключом.
          schema:
            type: string
            pattern: "^[a-f0-9]{64}$"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - $ref: '#/components/schemas/IngestBatch'
                - $ref: '#/components/schemas/LogEvent'
            examples:
              batch:
                summary: Пачка событий
                value:
                  logs:
                    - level: ERROR
                      message: Ошибка обработки команды
                      logger: bot.commands
                      version: 1.2.3
                      host: bot-host-01
                      trace_id: 6a4f5b4a
                      context:
                        command: /start
                        chat_id: 123456
              single:
                summary: Одиночное событие
                value:
                  level: INFO
                  message: Бот запущен
                  logger: bot.main
      responses:
        '200':
          description: События приняты.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IngestSuccess'
        '400':
          description: Некорректный JSON, формат событий или размер пачки.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Токен отсутствует или подпись неверна.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Токен отключён, удалён или событие нарушает политику токена.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Nonce уже использован.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '413':
          description: Тело запроса превышает лимит.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          description: Превышен лимит запросов.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
components:
  securitySchemes:
    LogTokenHeader:
      type: apiKey
      in: header
      name: X-Log-Token
      description: Raw bot token.
    LogTokenBearer:
      type: http
      scheme: bearer
      description: Raw bot token в Authorization Bearer.
  schemas:
    IngestBatch:
      type: object
      additionalProperties: false
      properties:
        logs:
          type: array
          minItems: 1
          maxItems: 500
          items:
            $ref: '#/components/schemas/LogEvent'
        events:
          type: array
          minItems: 1
          maxItems: 500
          items:
            $ref: '#/components/schemas/LogEvent'
      anyOf:
        - required: [logs]
        - required: [events]
    LogEvent:
      type: object
      additionalProperties: true
      properties:
        ts:
          description: Время события. Если не передано, используется время приёма.
          oneOf:
            - type: string
              format: date-time
            - type: integer
        level:
          type: string
          enum: [TRACE, DEBUG, INFO, WARNING, WARN, ERROR, CRITICAL, AUDIT, SECURITY]
          default: INFO
        message:
          type: string
          maxLength: 8000
        exception:
          type: string
          maxLength: 32768
        logger:
          type: string
          maxLength: 190
        version:
          type: string
          maxLength: 80
        host:
          type: string
          maxLength: 120
        trace_id:
          type: string
          maxLength: 120
        context:
          type: object
          additionalProperties: true
      required: [message]
    IngestSuccess:
      type: object
      properties:
        ok:
          type: boolean
          const: true
        inserted:
          type: integer
          minimum: 0
        message:
          type: string
      required: [ok, inserted, message]
    ErrorResponse:
      type: object
      properties:
        ok:
          type: boolean
          const: false
        error:
          type: string
        message:
          type: string
      required: [ok, error, message]
