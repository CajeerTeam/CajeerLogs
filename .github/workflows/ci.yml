name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Проверка исходников
    runs-on: ubuntu-latest
    steps:
      - name: Получение кода
        uses: actions/checkout@v4

      - name: Настройка PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: pdo, pdo_pgsql, pdo_sqlite
          coverage: none

      - name: Проверка синтаксиса PHP
        run: find app bin public -name '*.php' -print0 | xargs -0 -n1 php -l

      - name: Проверка синтаксиса Python
        run: python3 -m py_compile clients/bot.py

      - name: Самопроверка приложения
        run: php bin/self-test.php

      - name: Проверка Wiki-документации
        run: php bin/wiki-check.php

      - name: Проверка согласованности схемы
        run: php bin/schema-check.php

      - name: Проверка релизной готовности
        run: php bin/release-check.php

      - name: Проверка запрещённых упоминаний
        run: php bin/forbidden-scan.php

      - name: Проверка release/labels workflows
        run: |
          test -f .github/workflows/release.yml
          test -f .github/workflows/labels-sync.yml

      - name: Проверка запрещённых runtime-файлов
        run: |
          test ! -f .env
          ! find storage -type f ! -name '.gitkeep' | grep .


  integration-postgres:
    name: PostgreSQL migration + ingest smoke
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: cajeer_logs
          POSTGRES_PASSWORD: cajeer_logs_password
          POSTGRES_DB: cajeer_logs
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U cajeer_logs -d cajeer_logs"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: pdo, pdo_pgsql
          coverage: none
      - name: Подготовка .env
        run: |
          cp .env.example .env
          sed -i 's/^DB_CONNECTION=.*/DB_CONNECTION=pgsql/' .env
          sed -i 's/^DB_HOST=.*/DB_HOST=127.0.0.1/' .env
          sed -i 's/^DB_PORT=.*/DB_PORT=5432/' .env
          sed -i 's/^DB_DATABASE=.*/DB_DATABASE=cajeer_logs/' .env
          sed -i 's/^DB_USERNAME=.*/DB_USERNAME=cajeer_logs/' .env
          sed -i 's/^DB_PASSWORD=.*/DB_PASSWORD=cajeer_logs_password/' .env
          sed -i 's/^LOGS_TOKEN_PEPPER=.*/LOGS_TOKEN_PEPPER=0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef/' .env
          sed -i 's/^PRIVACY_HASH_PEPPER=.*/PRIVACY_HASH_PEPPER=abcdef0123456789abcdef0123456789abcdef0123456789abcdef0123456789/' .env
      - name: Миграции PostgreSQL
        run: php bin/migrate.php
      - name: Создание ingest-токена
        run: php bin/make-bot-token.php ExampleBot --project=ExampleProject --environment=production --require-signature > token.txt
      - name: Smoke ingest
        run: |
          TOKEN=$(grep -Eo 'cjl_[A-Za-z0-9]+' token.txt | head -n1)
          php -S 127.0.0.1:18080 -t public >/tmp/cajeerlogs-server.log 2>&1 &
          sleep 2
          php bin/ingest-smoke.php --url=http://127.0.0.1:18080/api/v1/ingest --token="$TOKEN" --signed
      - name: Проверка записи в БД
        run: php -r 'require "app/bootstrap.php"; $n=(int)CajeerLogs\Database::pdo()->query("SELECT COUNT(*) FROM log_events")->fetchColumn(); if ($n<1) { fwrite(STDERR,"log_events пуст\n"); exit(1); } echo "log_events={$n}\n";'

  integration-sqlite:
    name: SQLite migration smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: pdo, pdo_sqlite
          coverage: none
      - name: Подготовка .env
        run: |
          cp .env.example .env
          sed -i 's/^DB_CONNECTION=.*/DB_CONNECTION=sqlite/' .env
          echo 'DB_DATABASE=storage/cajeer_logs.sqlite' >> .env
          sed -i 's/^LOGS_TOKEN_PEPPER=.*/LOGS_TOKEN_PEPPER=0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef/' .env
          sed -i 's/^PRIVACY_HASH_PEPPER=.*/PRIVACY_HASH_PEPPER=abcdef0123456789abcdef0123456789abcdef0123456789abcdef0123456789/' .env
      - name: Миграции SQLite
        run: php bin/migrate.php
      - name: Самопроверка SQLite
        run: php bin/self-test.php


  alert-pipeline-smoke:
    name: Alert pipeline smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: pdo, pdo_sqlite
          coverage: none
      - name: Подготовка .env
        run: |
          cp .env.example .env
          sed -i 's/^DB_CONNECTION=.*/DB_CONNECTION=sqlite/' .env
          echo 'DB_DATABASE=storage/alert_pipeline.sqlite' >> .env
          sed -i 's/^ALERT_WEBHOOK_REQUIRE_ALLOWLIST=.*/ALERT_WEBHOOK_REQUIRE_ALLOWLIST=false/' .env
          sed -i 's/^LOGS_TOKEN_PEPPER=.*/LOGS_TOKEN_PEPPER=0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef/' .env
          sed -i 's/^PRIVACY_HASH_PEPPER=.*/PRIVACY_HASH_PEPPER=abcdef0123456789abcdef0123456789abcdef0123456789abcdef0123456789/' .env
      - name: Smoke alert pipeline
        run: php bin/alert-pipeline-smoke.php
