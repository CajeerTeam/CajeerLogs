name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Проверка исходников
    runs-on: ubuntu-latest
    steps:
      - name: Получение кода
        uses: actions/checkout@v4

      - name: Настройка PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: pdo, pdo_pgsql, pdo_sqlite
          coverage: none

      - name: Проверка синтаксиса PHP
        run: find app bin public -name '*.php' -print0 | xargs -0 -n1 php -l

      - name: Проверка синтаксиса Python
        run: python3 -m py_compile clients/bot.py

      - name: Самопроверка
        run: php bin/self-test.php

      - name: Проверка запрещённых файлов
        run: |
          test ! -f .env
          ! find storage -type f ! -name '.gitkeep' | grep .

  docs:
    name: Проверка Mintlify-документации
    runs-on: ubuntu-latest
    steps:
      - name: Получение кода
        uses: actions/checkout@v4

      - name: Настройка Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Установка Mintlify CLI
        run: npm i -g mint

      - name: Проверка Mintlify
        run: mint validate

      - name: Проверка битых ссылок
        run: mint broken-links --check-redirects
