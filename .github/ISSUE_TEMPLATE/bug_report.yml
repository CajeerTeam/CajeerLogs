name: Сообщение об ошибке
description: Сообщить о воспроизводимом некорректном поведении
title: "[Ошибка]: "
labels: [bug]
body:
  - type: textarea
    id: summary
    attributes:
      label: Краткое описание
      description: Опишите проблему без лишнего контекста.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Шаги воспроизведения
      description: Укажите точные действия, которые приводят к проблеме.
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Ожидаемое поведение
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Фактическое поведение
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Версия или commit
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Окружение
      description: Версия PHP, база данных, web-сервер и ОС.
  - type: textarea
    id: logs
    attributes:
      label: Связанные журналы
      description: Перед публикацией удалите секреты, токены и персональные данные.
      render: text
