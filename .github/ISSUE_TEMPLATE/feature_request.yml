name: Запрос улучшения
description: Предложить новую возможность или изменение
title: "[Улучшение]: "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Проблема
      description: Какую эксплуатационную или продуктовую проблему нужно решить?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Предложение
      description: Опишите желаемое поведение.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Рассмотренные альтернативы
  - type: textarea
    id: notes
    attributes:
      label: Дополнительный контекст
